    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ожидание одобрения</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                text-align: center;
                max-width: 500px;
            }
            .logo {
                font-size: 2.5rem;
                font-weight: bold;
                color: #2575fc;
                margin-bottom: 25px;
            }
            .text-muted {
                color: #6c757d !important;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="logo">SaaS AI Assistant</div>
            <h2 class="h4 mb-4 text-muted">Ваша компания "{{ company_name }}" ожидает одобрения</h2>
            <p class="text-muted">
                Спасибо за регистрацию! Администратор рассмотрит вашу заявку и свяжется с вами в ближайшее время.
            </p>
            <p class="text-muted small">
                Вы можете выйти из системы: <a href="{% url 'logout' %}">Выйти</a>
            </p>
        </div>
        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    </html>
