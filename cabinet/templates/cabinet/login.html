<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); /* Градиентный фон */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Современный шрифт */
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px; /* Скругленные углы */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Тень */
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2575fc; /* Логотип цветом */
            margin-bottom: 25px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(37, 117, 252, 0.25); /* Подсветка поля ввода */
            border-color: #2575fc;
        }
        .btn-primary {
            background-color: #2575fc;
            border-color: #2575fc;
            transition: all 0.3s ease; /* Плавный переход при наведении */
        }
        .btn-primary:hover {
            background-color: #1a5acf;
            border-color: #1a5acf;
            transform: translateY(-2px); /* Эффект при наведении */
        }
        .alert {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">AI TECH</div>
        <h2 class="h4 mb-4 text-muted">Вход в систему</h2>

        <form method="post">
            {% csrf_token %}
            {# Выводим ошибки, если они есть #}
            {% if form.errors %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ form.errors.as_text|striptags }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            {# Поле для логина (username) #}
            <div class="mb-3">
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Логин" required id="id_username">
            </div>
            {# Поле для пароля #}
            <div class="mb-4">
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Пароль" required id="id_password">
            </div>

            {# Кнопка входа #}
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Войти</button>

            {# Ссылка на регистрацию #}
            <p class="text-muted small">
                Нет аккаунта? <a href="{% url 'registration_company' %}" class="text-decoration-none">Зарегистрироваться</a>
            </p>
        </form>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
